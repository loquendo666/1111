<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>LoquendoTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root{
      --bg:#06090d;
      --surface:#0d1117;
      --card:#111820;
      --border:rgba(255,255,255,0.07);
      --accent:#e63946;
      --accent2:#ff6b6b;
      --gold:#f4c430;
      --text:#f0f4f8;
      --sub:#8898aa;
      --ok:#2ecc71;
      --nav:60px;
      --tab:46px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
      min-height:100vh;
    }

    /* ── PLAYING MODE ── */
    body.is-playing .top-nav,
    body.is-playing .secondary-nav,
    body.is-playing .main-content,
    body.is-playing #status{display:none!important}

    /* ══════════════════════════════
       NAVBAR
    ══════════════════════════════ */
    .top-nav{
      position:fixed;top:0;left:0;right:0;
      height:var(--nav);
      background:linear-gradient(180deg,rgba(6,9,13,1) 60%,rgba(6,9,13,0));
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;z-index:1000;
    }
    .logo{
      font-family:'Bebas Neue',sans-serif;
      font-size:28px;letter-spacing:3px;line-height:1;
    }
    .logo em{color:var(--accent);font-style:normal;text-shadow:0 0 24px rgba(230,57,70,0.5)}
    .live-dot{
      display:inline-flex;align-items:center;gap:5px;
      background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);
      border-radius:99px;padding:3px 9px;margin-left:10px;
      font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent);
    }
    .live-dot::before{
      content:'';width:6px;height:6px;border-radius:50%;
      background:var(--accent);animation:blink 1.4s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .nav-right{display:flex;gap:6px}
    .icon-btn{
      width:38px;height:38px;border-radius:10px;border:none;
      background:transparent;color:var(--sub);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all .18s;
    }
    .icon-btn svg{width:19px;height:19px}
    .icon-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}

    /* ══════════════════════════════
       TABS
    ══════════════════════════════ */
    .secondary-nav{
      position:fixed;top:var(--nav);left:0;right:0;
      height:var(--tab);
      background:rgba(6,9,13,0.92);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;
      padding:0 14px;gap:4px;
      z-index:999;overflow-x:auto;
    }
    .secondary-nav::-webkit-scrollbar{height:0}
    .nav-tab{
      padding:0 16px;height:32px;
      display:flex;align-items:center;gap:6px;
      cursor:pointer;user-select:none;
      font-size:12px;font-weight:700;
      color:var(--sub);border-radius:8px;
      transition:all .18s;white-space:nowrap;
      letter-spacing:.5px;text-transform:uppercase;
      border:1px solid transparent;
    }
    .nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}
    .nav-tab.active{
      color:var(--text);
      background:rgba(230,57,70,0.1);
      border-color:rgba(230,57,70,0.25);
    }
    .tab-pip{
      width:5px;height:5px;border-radius:50%;
      background:var(--accent);display:none;
    }
    .nav-tab.active .tab-pip{display:block}

    /* ══════════════════════════════
       MAIN
    ══════════════════════════════ */
    .main-content{
      margin-top:calc(var(--nav) + var(--tab));
      min-height:calc(100vh - var(--nav) - var(--tab));
      padding-bottom:40px;
    }

    /* ══════════════════════════════
       HOME — centrado fijo sin scroll
    ══════════════════════════════ */
    .home-wrap{
      position:fixed;
      top:calc(var(--nav) + var(--tab));
      left:0;right:0;bottom:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:14px;padding:16px 20px;
      overflow:hidden;
    }
    .home-hero{text-align:center;position:relative;flex-shrink:0;}
    .home-hero::before{
      content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
      width:320px;height:120px;
      background:radial-gradient(ellipse,rgba(230,57,70,0.13) 0%,transparent 70%);
      pointer-events:none;
    }
    .home-hero h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(28px,4vw,48px);
      letter-spacing:4px;line-height:1;margin-bottom:3px;
    }
    .home-hero h1 em{color:var(--accent);font-style:normal}
    .home-hero p{color:var(--sub);font-size:11px;font-weight:500}
    /* Filas de sección (reciente, favoritos, estrenos) */
    .home-sections{width:min(500px,100%);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
    .home-srow{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;background:var(--card);border:1px solid var(--border);
      border-radius:12px;cursor:pointer;transition:all .18s;
    }
    .home-srow:hover,.home-srow:focus{border-color:rgba(230,57,70,0.4);background:rgba(17,24,32,.95);}
    .home-srow-l{display:flex;align-items:center;gap:10px;}
    .home-srow-ic{font-size:18px;width:28px;text-align:center;}
    .home-srow-name{font-size:13px;font-weight:700;line-height:1.2;}
    .home-srow-sub{font-size:10px;color:var(--sub);margin-top:1px;}
    .home-srow-arr{color:var(--sub);font-size:16px;}
    /* Cuadros de tabs abajo */
    .home-cards{
      display:grid;grid-template-columns:repeat(4,1fr);
      gap:8px;width:min(500px,100%);flex-shrink:0;
    }
    @media(max-width:400px){.home-cards{grid-template-columns:repeat(2,1fr)}}
    .home-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:12px;padding:14px 10px;text-align:center;
      cursor:pointer;transition:all .18s;position:relative;overflow:hidden;
    }
    .home-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(230,57,70,0.07),transparent);opacity:0;transition:opacity .18s;}
    .home-card:hover,.home-card:focus{transform:translateY(-2px);border-color:rgba(230,57,70,0.4);box-shadow:0 6px 20px rgba(0,0,0,0.4);}
    .home-card:hover::after,.home-card:focus::after{opacity:1}
    .hc-icon{font-size:22px;margin-bottom:6px}
    .hc-title{font-size:11px;font-weight:800;letter-spacing:.2px}
    .hc-badge{
      display:inline-block;margin-top:5px;
      background:rgba(230,57,70,0.12);border:1px solid rgba(230,57,70,0.2);
      color:var(--accent2);font-size:9px;font-weight:700;
      padding:1px 7px;border-radius:99px;
    }
    /* Barra de progreso en tarjeta */
    .item-progress{height:3px;background:rgba(255,255,255,0.07);margin:0 8px 6px;border-radius:99px;overflow:hidden;}
    .item-progress-fill{height:100%;background:var(--accent);border-radius:99px;}
    /* Badge favorito */
    .fav-badge{position:absolute;top:5px;right:5px;z-index:3;font-size:12px;line-height:1;}
    /* Botón borrar de reciente */
    .del-recent-btn{
      position:absolute;top:5px;left:5px;z-index:4;
      background:rgba(0,0,0,0.7);border:none;color:#fff;
      width:24px;height:24px;border-radius:50%;font-size:13px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;opacity:0;transition:opacity .15s;
      backdrop-filter:blur(4px);line-height:1;
    }
    .item-card:hover .del-recent-btn,
    .item-card:focus .del-recent-btn,
    .item-card:focus-within .del-recent-btn{opacity:1}
    /* En táctil siempre visible */
    @media(hover:none){.del-recent-btn{opacity:0.85}}

    /* ══════════════════════════════
       BROWSE VIEW (sin carpetas)
    ══════════════════════════════ */
    .browse-wrap{padding:8px 0 0}

    /* SECCIÓN = una fila de categoría */
    .cat-section{
      padding:20px 0 4px;
    }
    .cat-section-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px 10px;
    }
    .cat-section-name{
      font-size:15px;font-weight:800;
      letter-spacing:.3px;
      display:flex;align-items:center;gap:8px;
    }
    .cat-section-name .n-count{
      font-size:11px;font-weight:600;color:var(--sub);
    }

    /* Scroll horizontal de portadas */
    .cat-row{
      display:flex;gap:10px;
      padding:0 20px 12px;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
    }
    .cat-row::-webkit-scrollbar{height:4px}
    .cat-row::-webkit-scrollbar-track{background:transparent}
    .cat-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

    /* ══════════════════════════════
       CARDS — VOD / SERIES
    ══════════════════════════════ */
    .item-card{
      flex:0 0 auto;
      width:130px;
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
      background:var(--card);
      border:1px solid var(--border);
      transition:transform .18s ease, border-color .18s, box-shadow .18s;
      scroll-snap-align:start;
      position:relative;
    }
    .item-card:hover,.item-card:focus-visible{
      transform:scale(1.05) translateY(-3px);
      border-color:rgba(230,57,70,0.5);
      box-shadow:0 14px 40px rgba(0,0,0,0.7),0 0 0 1px rgba(230,57,70,0.25);
      z-index:5;outline:none;
    }
    /* Foco TV/teclado — siempre visible */
    .item-card:focus{
      outline:2px solid var(--accent);
      outline-offset:2px;
      border-color:var(--accent);
    }

    /* Póster 2:3 (películas/series) */
    .item-poster{
      width:100%;
      aspect-ratio:2/3;
      position:relative;
      overflow:hidden;
      background:#07111b;
    }
    .item-poster img{
      width:100%;height:100%;
      object-fit:cover;
      display:block;
      transition:transform .3s ease, opacity .28s ease;
      opacity:0;
    }
    .item-poster img.loaded{opacity:1;}
    .item-card:hover .item-poster img,
    .item-card:focus .item-poster img{transform:scale(1.04)}
    .item-poster::after{
      content:'';position:absolute;
      bottom:0;left:0;right:0;height:55%;
      background:linear-gradient(transparent,rgba(6,9,13,0.93));
      pointer-events:none;
    }

    /* ══════════════════════════════
       LIVE CARD — más grande, imagen que llena todo
    ══════════════════════════════ */
    .item-card.live-card{
      width:44vw;          /* casi la mitad de la pantalla → se ven 2.2 a la vez */
      max-width:200px;     /* tope en pantallas grandes */
      min-width:140px;     /* tope mínimo */
    }
    .item-card.live-card .item-poster{
      aspect-ratio:16/9;   /* formato TV */
      background:#040d16;
    }
    /* La imagen llena TODA la tarjeta — igual que un screenshot de TV */
    .item-card.live-card .item-poster img{
      object-fit:cover;    /* llena sin dejar bordes negros */
      object-position:center;
      padding:0;
    }
    /* Gradiente más pronunciado abajo para leer el nombre */
    .item-card.live-card .item-poster::after{
      height:60%;
      background:linear-gradient(transparent,rgba(4,8,14,0.97));
    }
    /* Nombre del canal DENTRO de la imagen (overlay) — más grande y visible */
    .item-card.live-card .item-info{
      position:absolute;
      bottom:0;left:0;right:0;
      padding:8px 10px 10px;
      background:transparent;
    }
    .item-card.live-card .item-name{
      font-size:12px;
      font-weight:800;
      text-shadow:0 1px 6px rgba(0,0,0,0.9);
      color:#fff;
      -webkit-line-clamp:2;
    }

    /* Fallback sin imagen */
    .item-fallback{
      width:100%;height:100%;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:6px;padding:12px;
      background:linear-gradient(145deg,#0d1a26,#080e16);
    }
    .item-fallback .fi{font-size:28px;opacity:.4}
    .item-fallback .fn{
      font-size:10px;font-weight:700;
      color:var(--sub);text-align:center;line-height:1.3;
    }

    /* LIVE badge */
    .live-badge{
      position:absolute;top:6px;left:6px;z-index:2;
      background:var(--accent);color:#fff;
      font-size:8px;font-weight:800;letter-spacing:1px;
      padding:2px 6px;border-radius:4px;
      text-transform:uppercase;
    }

    /* Play overlay */
    .play-overlay{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .2s;
      background:rgba(0,0,0,0.28);
      border-radius:9px;
    }
    .item-card:hover .play-overlay{opacity:1}
    .play-circle{
      width:42px;height:42px;border-radius:50%;
      background:rgba(230,57,70,0.9);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 18px rgba(230,57,70,0.5);
    }
    .play-circle svg{width:16px;height:16px;fill:#fff;margin-left:2px}

    .item-info{padding:7px 9px 5px}
    .item-name{
      font-size:11px;font-weight:700;color:var(--text);
      line-height:1.35;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    /* Cards en cuadrícula — ocupan 100% de la celda grid */
    .search-grid .item-card{
      width:100%;flex:none;
    }
    /* Barra de progreso */
    .item-progress{height:3px;background:rgba(255,255,255,0.08);margin:0 8px 6px;border-radius:99px;overflow:hidden;}
    .item-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;}
    /* Badge favorito */
    .fav-badge{position:absolute;top:5px;right:5px;z-index:3;font-size:12px;line-height:1;}
    /* Botón borrar de reciente */
    .del-recent-btn{
      position:absolute;top:5px;left:5px;z-index:4;
      background:rgba(0,0,0,0.7);border:none;color:#fff;
      width:24px;height:24px;border-radius:50%;font-size:13px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;opacity:0;transition:opacity .15s;
      backdrop-filter:blur(4px);line-height:1;
    }
    .item-card:hover .del-recent-btn,
    .item-card:focus .del-recent-btn,
    .item-card:focus-within .del-recent-btn{opacity:1}
    /* En táctil siempre visible */
    @media(hover:none){.del-recent-btn{opacity:0.85}}

    /* Skeleton loader */
    .skeleton{
      background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,0.04) 50%,var(--card) 75%);
      background-size:200% 100%;
      animation:shimmer 1.4s infinite;
      border-radius:10px;
    }
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-card{flex:0 0 auto;width:130px}
    .skel-poster{aspect-ratio:2/3;border-radius:10px}
    .skel-title{height:10px;border-radius:4px;margin:8px 8px 4px;width:80%}

    /* ══════════════════════════════
       SEARCH — barra fija top, resultados en main
    ══════════════════════════════ */
    .search-bar{
      position:fixed;
      top:calc(var(--nav) + var(--tab));
      left:0;right:0;
      z-index:500;
      padding:10px 14px 8px;
      background:rgba(6,9,13,0.97);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:none;
      align-items:center;gap:10px;
    }
    .search-bar.active{display:flex}
    .search-input{
      flex:1;padding:12px 16px;
      background:rgba(255,255,255,0.07);
      border:1.5px solid var(--border);
      border-radius:12px;color:var(--text);
      font-size:15px;font-family:'Inter',sans-serif;
      transition:border-color .2s;
    }
    .search-input:focus{
      outline:none;border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(230,57,70,0.12);
    }
    .search-close-btn{
      border:none;background:rgba(255,255,255,0.08);
      color:var(--sub);width:38px;height:38px;border-radius:10px;
      font-size:18px;cursor:pointer;flex:0 0 auto;
      display:flex;align-items:center;justify-content:center;
      transition:all .15s;
    }
    .search-close-btn:hover{background:rgba(255,255,255,0.15);color:var(--text)}
    /* Cuando la barra de búsqueda está activa, bajar el main-content */
    body.search-active .main-content{
      padding-top:calc(var(--nav) + var(--tab) + 62px);
    }
    .search-hint-inline{
      padding:30px 20px;text-align:center;color:var(--sub);font-size:13px;line-height:1.6;
    }
    .search-tabs{
      display:flex;gap:8px;padding:10px 14px 0;
      overflow-x:auto;-webkit-overflow-scrolling:touch;
    }
    .search-tab-btn{
      border:1px solid var(--border);background:transparent;
      color:var(--sub);padding:7px 16px;border-radius:99px;
      cursor:pointer;font-weight:700;font-size:12px;
      font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;flex:0 0 auto;
    }
    .search-tab-btn.active{
      border-color:var(--accent);color:var(--text);background:rgba(230,57,70,0.12);
    }
    /* search-box antiguo — oculto, ya no se usa */
    .search-box{display:none!important;}

    /* Search results / Recientes / Favoritos / Estrenos */
    .search-results{padding:0 0 40px;}
    .search-results .section-header{margin-bottom:0;}
    .search-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      padding:14px 12px;
    }

    /* ══════════════════════════════
       SECTION HEADER (search / series)
    ══════════════════════════════ */
    .section-header{
      display:flex;align-items:center;gap:12px;
      padding:14px 20px 10px;
      position:sticky;top:calc(var(--nav) + var(--tab));
      background:rgba(6,9,13,0.94);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      z-index:10;border-bottom:1px solid var(--border);
    }
    .back-btn{
      display:flex;align-items:center;gap:6px;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      color:var(--sub);padding:8px 14px;
      border-radius:8px;cursor:pointer;
      font-size:13px;font-weight:600;
      font-family:'Inter',sans-serif;
      transition:all .18s;white-space:nowrap;
    }
    .back-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.1)}
    .sec-name{font-size:16px;font-weight:800}
    .sec-count{font-size:12px;color:var(--sub);font-weight:500}

    /* ══════════════════════════════
       SERIES DETAIL
    ══════════════════════════════ */
    .series-detail{padding-bottom:32px}
    .series-hero{
      display:flex;gap:20px;
      padding:24px 20px;
      border-bottom:1px solid var(--border);
    }
    .series-cover{
      width:120px;height:178px;
      border-radius:12px;object-fit:cover;
      background:var(--card);border:1px solid var(--border);
      flex:0 0 auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);
    }
    .series-meta{flex:1;min-width:0}
    .series-meta h2{font-size:21px;font-weight:900;margin-bottom:10px}
    .series-plot{
      color:var(--sub);font-size:13px;line-height:1.5;
      margin-bottom:12px;max-height:78px;overflow:hidden;
      display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;
    }
    .series-fields{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:14px}
    .s-field{color:var(--sub);font-size:12px}
    .s-field strong{color:var(--text);font-weight:700}
    .start-btn{
      background:var(--accent);border:none;color:#fff;
      padding:12px 20px;border-radius:10px;
      font-weight:800;font-size:13px;letter-spacing:.5px;
      cursor:pointer;width:100%;max-width:280px;
      font-family:'Inter',sans-serif;transition:all .2s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .start-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(230,57,70,0.4)}
    .season-tabs{
      display:flex;gap:8px;padding:14px 20px;
      overflow-x:auto;border-bottom:1px solid var(--border);
    }
    .season-tabs::-webkit-scrollbar{height:0}
    .season-tab{
      padding:8px 16px;border:1px solid var(--border);
      border-radius:99px;color:var(--sub);cursor:pointer;
      user-select:none;font-size:12px;font-weight:700;
      white-space:nowrap;background:transparent;
      transition:all .18s;font-family:'Inter',sans-serif;
    }
    .season-tab:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
    .season-tab.active{border-color:var(--accent);color:var(--text);background:rgba(230,57,70,0.1)}
    .episode-list{display:flex;flex-direction:column}
    .ep-item{
      display:flex;align-items:center;gap:14px;
      padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);
      cursor:pointer;transition:background .15s;
    }
    .ep-item:hover{background:rgba(255,255,255,0.03)}
    .ep-num{
      width:38px;height:38px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(230,57,70,0.1);border-radius:10px;
      color:var(--accent2);font-weight:800;font-size:12px;
      flex:0 0 auto;border:1px solid rgba(230,57,70,0.2);
    }
    .ep-text{min-width:0;flex:1}
    .ep-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .ep-sub{font-size:12px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* ══════════════════════════════
       STATUS
    ══════════════════════════════ */
    .status{
      position:fixed;bottom:18px;right:18px;
      padding:7px 14px;background:rgba(10,14,20,0.96);
      border-radius:99px;font-size:11px;font-weight:600;
      z-index:1100;border:1px solid var(--border);
      backdrop-filter:blur(10px);transition:all .3s;
    }
    .status.connected{color:var(--ok);border-color:rgba(46,204,113,0.4)}
    .status.error{color:#ff6b6b;border-color:rgba(255,107,107,0.4)}
    .status.loading{color:var(--gold);border-color:rgba(244,196,48,0.4)}

    /* ══════════════════════════════
       LOADING OVERLAY
    ══════════════════════════════ */
    .loading-overlay{
      position:fixed;inset:0;background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:18px;z-index:3000;
      text-align:center;padding:20px;
    }
    .loading-overlay.hidden{display:none}
    .loading-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px}
    .loading-logo em{color:var(--accent);font-style:normal}
    .loading-spinner{
      width:46px;height:46px;
      border:3px solid rgba(230,57,70,0.15);
      border-top-color:var(--accent);
      border-radius:50%;animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-msg{color:var(--sub);font-size:14px;font-weight:500}
    .loading-detail{color:rgba(255,107,107,0.8);font-size:12px;line-height:1.4;max-width:520px;white-space:pre-wrap}

    /* ══════════════════════════════
       PLAYER
    ══════════════════════════════ */
    .player-overlay{
      position:fixed;inset:0;background:#000;
      z-index:2000;display:none;
      align-items:center;justify-content:center;
    }
    .player-overlay.active{display:flex}
    .player-container{width:100%;height:100%;background:#000;position:relative}
    video{width:100%;height:100%;object-fit:contain}
    .player-header{
      position:absolute;top:0;left:0;right:0;
      padding:16px;
      background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);
      display:flex;align-items:center;justify-content:space-between;
      z-index:10;opacity:1;transition:opacity .3s;gap:12px;
    }
    /* Header siempre oculto — se muestra con .visible (gestionado por JS) */
    .player-header{opacity:0;pointer-events:none}
    .player-header.visible{opacity:1;pointer-events:auto}
    /* En fullscreen también se oculta (JS lo gestiona igual) */
    .player-title{font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .pbtns{display:flex;gap:8px;flex:0 0 auto}
    .pbtn{
      border:none;background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);
      color:#fff;padding:9px 12px;border-radius:10px;
      font-weight:800;cursor:pointer;min-width:40px;
      transition:background .18s;font-family:'Inter',sans-serif;font-size:13px;
    }
    .pbtn:hover{background:rgba(255,255,255,0.2)}
    .pbtn:active{transform:scale(.96)}
    .player-loading{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:50px;height:50px;
      border:3px solid rgba(255,255,255,0.1);
      border-top-color:var(--accent);
      border-radius:50%;animation:spin .8s linear infinite;
      display:none;z-index:20;
    }
    /* fullscreen: el header sigue gestionado por JS */
    .player-drawer{
      position:absolute;top:0;right:0;height:100%;
      width:340px;max-width:100%;
      background:rgba(6,9,13,0.97);backdrop-filter:blur(20px);
      border-left:1px solid var(--border);z-index:30;
      transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;
    }
    .player-drawer.active{transform:translateX(0)}
    .drawer-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;border-bottom:1px solid var(--border);gap:10px;
    }
    .drawer-title{font-weight:800;font-size:13px}
    .drawer-search{
      margin:12px 14px 8px;padding:11px 14px;
      background:rgba(255,255,255,0.05);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-size:13px;
      font-family:'Inter',sans-serif;width:calc(100% - 28px);
    }
    .drawer-search:focus{outline:none;border-color:var(--accent)}
    .drawer-list{overflow:auto;padding:4px 8px 12px;flex:1;-webkit-overflow-scrolling:touch}
    .drawer-item{
      display:flex;align-items:center;gap:10px;
      padding:10px;border-radius:10px;cursor:pointer;transition:background .15s;
    }
    .drawer-item:hover{background:rgba(255,255,255,0.05)}
    .drawer-item.active{background:rgba(230,57,70,0.12)}
    .drawer-item .t{color:var(--text);font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .drawer-item .s{color:var(--sub);font-size:11px;flex:0 0 auto}

    /* ══════════════════════════════
       MODAL LISTA
    ══════════════════════════════ */
    .list-modal{
      position:fixed;inset:0;
      background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);
      z-index:2600;display:none;
      align-items:center;justify-content:center;padding:20px;
    }
    .list-modal.active{display:flex}
    .list-card{
      width:min(600px,100%);background:var(--surface);
      border:1px solid var(--border);border-radius:20px;overflow:hidden;
      box-shadow:0 24px 80px rgba(0,0,0,0.8);
      animation:modalIn .25s cubic-bezier(.4,0,.2,1);
    }
    @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .list-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 20px;border-bottom:1px solid var(--border);
    }
    .list-title{font-size:16px;font-weight:800}
    .list-x{
      border:none;background:rgba(255,255,255,0.07);color:var(--sub);
      width:32px;height:32px;border-radius:8px;cursor:pointer;
      font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;
    }
    .list-x:hover{background:rgba(255,255,255,0.12);color:var(--text)}
    .list-tabs{display:flex;gap:8px;padding:14px 20px 0}
    .list-tab{
      border:1px solid var(--border);background:transparent;
      color:var(--sub);padding:9px 18px;border-radius:99px;
      cursor:pointer;font-weight:700;font-size:13px;font-family:'Inter',sans-serif;transition:all .18s;
    }
    .list-tab.active{border-color:var(--accent);color:var(--text);background:rgba(230,57,70,0.1)}
    .list-body{padding:16px 20px 20px}
    .list-hint{
      color:var(--sub);font-size:12px;line-height:1.5;
      margin-bottom:14px;padding:10px 14px;
      background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid var(--border);
    }
    .list-label{
      display:block;font-size:11px;font-weight:700;color:var(--sub);
      text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:14px;
    }
    .list-input{
      width:100%;padding:12px 14px;
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-size:14px;
      font-family:'Inter',sans-serif;transition:all .2s;
    }
    .list-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(230,57,70,0.1)}
    .list-row{display:flex;gap:12px}
    .list-col{flex:1;min-width:0}
    .list-actions{display:flex;gap:10px;margin-top:16px}
    .list-btn{
      border:none;background:var(--accent);color:#fff;
      padding:12px 20px;border-radius:10px;font-weight:800;
      font-size:14px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;
    }
    .list-btn:hover{background:var(--accent2)}
    .list-btn.ghost{background:transparent;border:1px solid var(--border);color:var(--sub)}
    .list-btn.ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
    .list-error{margin-top:10px;color:#ff9090;font-size:12px;white-space:pre-wrap}
    .list-preview{
      margin-top:12px;padding:12px 14px;
      border-radius:10px;border:1px solid rgba(46,204,113,0.25);
      background:rgba(46,204,113,0.04);color:var(--ok);
      font-size:12px;line-height:1.5;
    }
    @media(max-width:520px){.list-row{flex-direction:column}}

    /* ══════════════════════════════
       TOAST
    ══════════════════════════════ */
    .toast{
      position:fixed;left:50%;bottom:74px;
      transform:translateX(-50%) translateY(16px);
      opacity:0;pointer-events:none;
      background:rgba(10,14,20,0.97);border:1px solid var(--border);
      color:var(--text);padding:10px 18px;border-radius:99px;
      font-size:13px;font-weight:600;z-index:2700;
      transition:opacity .25s,transform .25s;
      max-width:min(92vw,560px);text-align:center;white-space:pre-wrap;
      backdrop-filter:blur(16px);
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.ok{border-color:rgba(46,204,113,0.45);color:var(--ok)}
    .toast.err{border-color:rgba(255,107,107,0.45);color:#ff9090}
    body.modal-open{overflow:hidden}

    /* ══════════════════════════════
       EMPTY STATE
    ══════════════════════════════ */
    .empty-state{padding:60px 20px;text-align:center;color:var(--sub)}
    .empty-state .ei{font-size:44px;margin-bottom:14px;opacity:.5}
    .empty-state p{font-size:14px;margin-bottom:18px}

    /* ══════════════════════════════
       CONTROL REMOTO - FOCUS
    ══════════════════════════════ */
    /* ── FOCO — visible en todos los dispositivos ──────────── */
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
    /* TV/control remoto: foco siempre visible sin necesidad de :focus-visible */
    .item-card:focus,
    .home-card:focus,
    .nav-tab:focus,
    .ep-item:focus,
    .season-tab:focus,
    .drawer-item:focus,
    .pbtn:focus,
    .back-btn:focus,
    .icon-btn:focus{
      outline:2px solid var(--accent);
      outline-offset:2px;
      border-color:var(--accent)!important;
    }
    /* Escalar la tarjeta enfocada — feedback visual claro en TV */
    .item-card:focus{
      transform:scale(1.08) translateY(-3px)!important;
      box-shadow:0 16px 48px rgba(0,0,0,0.8),0 0 0 2px var(--accent)!important;
      z-index:10;
    }
    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media(max-width:600px){
      .item-card{width:120px}
      .item-card.live-card{width:46vw;min-width:130px}
      .skel-card{width:120px}
      .series-cover{width:100px;height:148px}
      .search-box{width:100%}
      .player-drawer{width:100%}
    }
    @media(max-width:420px){
      .item-card{width:110px}
      .item-card.live-card{width:48vw;min-width:120px}
      .skel-card{width:110px}
      .search-grid{gap:8px;padding:10px 10px;}
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    /* entrada suave — solo primeras secciones */
    .cat-section:nth-child(-n+3){animation:fadeUp .25s ease both}
    .cat-row{contain:layout style}

    /* ══════════════════════════════════════════════
       GUÍA DE CANALES — vista lista para Live TV
    ══════════════════════════════════════════════ */

    /* Barra de categorías horizontal sticky */
    .ch-cats{
      position:sticky;
      top:calc(var(--nav) + var(--tab));
      z-index:200;
      display:flex;gap:0;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      background:rgba(6,9,13,0.97);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 4px;
      scrollbar-width:none;
    }
    .ch-cats::-webkit-scrollbar{display:none}

    .ch-cat-btn{
      flex:0 0 auto;
      padding:12px 16px;
      font-size:12px;font-weight:700;
      color:var(--sub);
      background:transparent;border:none;
      cursor:pointer;font-family:'Inter',sans-serif;
      white-space:nowrap;
      border-bottom:3px solid transparent;
      transition:color .15s, border-color .15s;
      letter-spacing:.3px;
    }
    .ch-cat-btn:hover{color:var(--text);}
    .ch-cat-btn.active{
      color:var(--text);
      border-bottom-color:var(--accent);
    }
    .ch-cat-btn:focus{outline:2px solid var(--accent);outline-offset:-2px;}

    /* Lista de canales */
    .ch-list{
      display:flex;flex-direction:column;
      padding:0 0 60px;
    }

    /* Cada ítem de canal */
    .ch-item{
      display:flex;align-items:center;gap:14px;
      padding:11px 16px;
      border-bottom:1px solid rgba(255,255,255,0.04);
      cursor:pointer;
      transition:background .12s;
      position:relative;
    }
    .ch-item:hover,.ch-item:focus{
      background:rgba(255,255,255,0.05);
      outline:none;
    }
    .ch-item:focus{
      outline:2px solid var(--accent);
      outline-offset:-2px;
    }
    .ch-item.playing{
      background:rgba(230,57,70,0.08);
      border-left:3px solid var(--accent);
      padding-left:13px;
    }

    /* Logo del canal */
    .ch-logo{
      flex:0 0 52px;height:52px;
      border-radius:8px;
      overflow:hidden;
      background:#0a1420;
      display:flex;align-items:center;justify-content:center;
    }
    .ch-logo img{
      width:100%;height:100%;
      object-fit:contain;padding:6px;
      opacity:0;transition:opacity .2s;
    }
    .ch-logo img.loaded{opacity:1}
    .ch-logo-fallback{
      font-size:22px;opacity:.35;
    }

    /* Número del canal */
    .ch-num{
      flex:0 0 36px;
      font-size:13px;font-weight:700;
      color:var(--sub);text-align:right;
      font-variant-numeric:tabular-nums;
    }

    /* Info del canal */
    .ch-info{flex:1;min-width:0;}
    .ch-name{
      font-size:14px;font-weight:700;
      color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .ch-epg{
      font-size:11px;color:var(--sub);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      margin-top:2px;
    }

    /* Flecha derecha */
    .ch-arrow{
      flex:0 0 auto;
      color:var(--sub);font-size:16px;opacity:.3;
    }
    .ch-item:hover .ch-arrow,.ch-item:focus .ch-arrow{opacity:.7;}

    /* Separador de categoría dentro de la lista */
    .ch-group-header{
      padding:14px 16px 6px;
      font-size:11px;font-weight:800;
      color:var(--sub);
      text-transform:uppercase;letter-spacing:1.2px;
      background:var(--bg);
      position:sticky;
      top:calc(var(--nav) + var(--tab) + 42px); /* debajo del tab de cats */
      z-index:10;
      border-bottom:1px solid var(--border);
    }

    /* Buscador inline sobre la lista de canales */
    .ch-search-wrap{
      padding:10px 14px 6px;
      position:sticky;
      top:calc(var(--nav) + var(--tab) + 42px);
      z-index:199;
      background:rgba(6,9,13,0.97);
      backdrop-filter:blur(10px);
    }
    .ch-search{
      width:100%;padding:10px 14px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--border);
      border-radius:10px;color:var(--text);
      font-size:13px;font-family:'Inter',sans-serif;
      transition:border-color .2s;
    }
    .ch-search:focus{outline:none;border-color:var(--accent);}

    /* Indicador de reproducción activa */
    .ch-playing-dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--accent);
      flex:0 0 auto;
      animation:pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">LOQUENDO<em>TV</em></div>
  <div class="loading-spinner" id="loadingSpinner"></div>
  <div class="loading-msg" id="loadingMsg">Conectando…</div>
  <div class="loading-detail" id="loadingDetail"></div>
  <div style="margin-top:8px">
    <button class="back-btn" id="loadingBtn" style="display:none">↺ Reintentar</button>
  </div>
</div>

<!-- NAVBAR -->
<div class="top-nav">
  <div style="display:flex;align-items:center">
    <div class="logo">LOQUENDO<em>TV</em></div>
    <div class="live-dot">LIVE</div>
  </div>
  <div class="nav-right">
    <button class="icon-btn" id="btnSearch" title="Buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="icon-btn" id="btnRefresh" title="Recargar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
    </button>
    <button class="icon-btn" id="btnAddList" title="Agregar lista">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
    </button>
  </div>
</div>

<!-- TABS -->
<div class="secondary-nav" id="tabs">
  <div class="nav-tab active" data-tab="home"><span class="tab-pip"></span>Inicio</div>
  <div class="nav-tab" data-tab="live"><span class="tab-pip"></span>TV en Vivo</div>
  <div class="nav-tab" data-tab="series"><span class="tab-pip"></span>Series</div>
  <div class="nav-tab" data-tab="vod"><span class="tab-pip"></span>Películas</div>
</div>

<!-- SEARCH BAR -->
<div class="search-bar" id="searchBar">
  <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar en TV, Series, Películas…" autocomplete="off" inputmode="search"/>
  <button class="search-close-btn" id="btnCloseSearch" title="Cerrar">✕</button>
</div>
<!-- tab selector de búsqueda -->
<div class="search-tabs" id="searchTabs" style="display:none">
  <button class="search-tab-btn active" data-search-tab="vod">🎬 Películas</button>
  <button class="search-tab-btn" data-search-tab="series">🎭 Series</button>
  <button class="search-tab-btn" data-search-tab="live">📡 TV</button>
</div>
<!-- compatibilidad: search-box vacío oculto -->
<div id="searchBox" style="display:none"></div>

<!-- MODAL LISTA -->
<div class="list-modal" id="listModal" aria-hidden="true">
  <div class="list-card" role="dialog" aria-modal="true" aria-label="Agregar lista">
    <div class="list-head">
      <div class="list-title">Agregar lista IPTV</div>
      <button class="list-x" id="btnCloseList">✕</button>
    </div>
    <div class="list-tabs">
      <button class="list-tab active" id="tabXtream" type="button">Xtream</button>
      <button class="list-tab" id="tabM3u" type="button">URL M3U</button>
    </div>
    <div class="list-body">
      <div class="list-hint">Tus datos se guardan en este dispositivo. Si cambias de navegador deberás cargarlos de nuevo.</div>
      <div class="list-pane" id="paneXtream">
        <label class="list-label">Servidor</label>
        <input class="list-input" id="inServer" placeholder="http://IP:PUERTO" autocomplete="off"/>
        <div class="list-row">
          <div class="list-col">
            <label class="list-label">Usuario</label>
            <input class="list-input" id="inUser" placeholder="usuario" autocomplete="off"/>
          </div>
          <div class="list-col">
            <label class="list-label">Contraseña</label>
            <input class="list-input" id="inPass" placeholder="contraseña" autocomplete="off"/>
          </div>
        </div>

/* Detecta si un nombre de categoría o título es contenido adulto */
function isAdultContent(str){
  return /\bxxx\b|\badult|adulto|18\s*\+|mayor.*edad|porno|porn|erotic|erotica|hentai|playboy|penthouse|brazzers|hustler|sex(ual)?\b/i
    .test(String(str||''));
}
/* ¿Está desbloqueado? — solo en memoria, se bloquea al cerrar el reproductor */
let _adultUnlocked=false;
function isAdultUnlocked(){ return _adultUnlocked; }
function unlockAdult(){ _adultUnlocked=true; }
function lockAdult(){ _adultUnlocked=false; }
/* Mostrar modal de contraseña y llamar onSuccess si es correcta */
function requireAdultPin(onSuccess){
  if(isAdultUnlocked()){ onSuccess(); return; }
  const old=document.getElementById('adultPinModal'); if(old) old.remove();
  const m=document.createElement('div');
  m.id='adultPinModal';

  m.innerHTML=`<div style="background:#0d1117;border:1px solid rgba(255,0,50,.25);border-radius:20px;padding:28px 24px;max-width:300px;width:100%;text-align:center;box-shadow:0 0 60px rgba(230,57,70,.15)">

      style="width:100%;padding:14px;text-align:center;font-size:22px;font-weight:800;letter-spacing:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-family:Inter,sans-serif;outline:none;margin-bottom:16px"

    <div style="display:flex;gap:10px">
      <button id="adultPinOk" style="flex:1;border:none;background:#e63946;color:#fff;padding:13px;border-radius:11px;font-weight:900;font-size:14px;cursor:pointer;font-family:Inter,sans-serif">Entrar</button>
      <button id="adultPinCancel" style="flex:0 0 auto;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8898aa;padding:13px 16px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;font-family:Inter,sans-serif">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  const inp=m.querySelector('#adultPinInput');
  const err=m.querySelector('#adultPinError');

  }

  m.querySelector('#adultPinCancel').onclick=()=>m.remove();
  inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter') tryPin(); if(e.key==='Escape') m.remove(); });

}

/* ── FAVORITOS ── */
function readFavs(){try{return JSON.parse(localStorage.getItem(FAV_KEY)||'{}')}catch{return {}}}
function isFav(type,id){return !!readFavs()[type+'::'+id]}
function toggleFav(type,id,name,cover){
  const f=readFavs(),k=type+'::'+id;
  if(f[k]) delete f[k]; else f[k]={type,id:String(id),name:String(name||''),cover:String(cover||''),ts:Date.now()};
  try{localStorage.setItem(FAV_KEY,JSON.stringify(f))}catch{}
  return !!f[k];
}
function getFavList(){return Object.values(readFavs()).sort((a,b)=>b.ts-a.ts)}

/* ── PROGRESO ── */
function readProg(){try{return JSON.parse(localStorage.getItem(PROG_KEY)||'{}')}catch{return {}}}
function saveProgress(type,id,cur,dur){
  if(!id||!dur||dur<30) return;
  const pct=Math.min(1,cur/dur);
  if(pct>0.95){clearProgress(type,id);return;}
  const p=readProg(); p[type+'::'+id]={type,id:String(id),current:cur,duration:dur,pct,ts:Date.now()};
  try{localStorage.setItem(PROG_KEY,JSON.stringify(p))}catch{}
}
function getProgress(type,id){return readProg()[type+'::'+id]||null}
function clearProgress(type,id){const p=readProg();delete p[type+'::'+id];try{localStorage.setItem(PROG_KEY,JSON.stringify(p))}catch{}}
function getRecentProgress(){return Object.values(readProg()).sort((a,b)=>b.ts-a.ts).slice(0,20)}

/* ── RECIENTES ── */
function addRecent(type,id,name,cover){
  // Nunca guardar contenido adulto en recientes
  if(isAdultContent(name)) return;
  try{
    let l=JSON.parse(localStorage.getItem(REC_KEY)||'[]');
    l=l.filter(r=>!(r.type===type&&String(r.id)===String(id)));
    l.unshift({type,id:String(id),name:String(name||''),cover:String(cover||''),ts:Date.now()});
    localStorage.setItem(REC_KEY,JSON.stringify(l.slice(0,50)));
  }catch{}
}
function getRecent(){try{return JSON.parse(localStorage.getItem(REC_KEY)||'[]')}catch{return []}}

function readSource(){
  try{
    const raw = localStorage.getItem(SOURCE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj||typeof obj!=='object') return null;
    return { server:String(obj.server||''), username:String(obj.username||''), password:String(obj.password||'') };
  }catch{ return null; }
}
function writeSource({server,username,password}){
  try{ localStorage.setItem(SOURCE_KEY,JSON.stringify({server:String(server||''),username:String(username||''),password:String(password||'')})); }catch{}
}
function clearAllCacheKeys(){
  try{
    const prefix='LoquendoTV_cache_v2::';
    const keys=[];
    for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.startsWith(prefix)) keys.push(k); }
    keys.forEach(k=>localStorage.removeItem(k));
  }catch{}
}
function normalizeServerInput(input){
  let s=String(input||'').trim();
  if(!s) return '';
  if(!/^https?:\/\//i.test(s)) s='http://'+s;
  try{
    const u=new URL(s);
    const path=u.pathname||'/';
    const lower=path.toLowerCase();
    if(lower.endsWith('/get.php')||lower.endsWith('/player_api.php')){
      const dir=path.split('/').slice(0,-1).join('/')||'';
      return (u.origin+dir).replace(/\/$/,'');
    }
    return (u.origin+(path!=='/'?path:'')).replace(/\/$/,'');
  }catch{ return ''; }
}
function parseM3uToXtream(m3uUrl){
  const raw=String(m3uUrl||'').trim();
  if(!raw) return null;
  let s=raw;
  if(!/^https?:\/\//i.test(s)) s='http://'+s;
  const u=new URL(s);
  const username=u.searchParams.get('username')||'';
  const password=u.searchParams.get('password')||'';
  const path=u.pathname||'/';
  const dir=path.toLowerCase().endsWith('/get.php')?(path.split('/').slice(0,-1).join('/')||''):(path!=='/'?path:'');
  const server=(u.origin+dir).replace(/\/$/,'');
  if(!server||!username||!password) return null;
  return {server,username,password};
}

(function applyStoredSource(){

function escapeHtml(text){ const div=document.createElement('div'); div.textContent=text??''; return div.innerHTML; }
function escapeAttr(v){ return String(v??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sanitizePassword(raw){
  if(!raw) return '';
  const amp=raw.indexOf('&');
  if(amp===-1) return raw;
  const tail=raw.slice(amp+1);
  const looksLikeParams=/(type|output|format|m3u|m3u_plus)(=|$)/i.test(tail);
  if(looksLikeParams) return raw.slice(0,amp);
  return raw;
}

const SERVER   = String(config.server||'').replace(/\/$/,'');
const USERNAME = String(config.username||'');
const PASSWORD = sanitizePassword(String(config.password||''));
const USER_PATH= encodeURIComponent(USERNAME);
const PASS_PATH= encodeURIComponent(PASSWORD);
const CACHE_PREFIX=`LoquendoTV_cache_v2::${SERVER}::${USERNAME}::`;

function cacheGet(key){
  try{
    const raw=localStorage.getItem(CACHE_PREFIX+key);
    if(!raw) return null;
    const obj=JSON.parse(raw);
    if(!obj||!obj.exp||Date.now()>obj.exp) return null;
    return obj.data;
  }catch{ return null; }
}
function cacheSet(key,data,hours){
  try{ const exp=Date.now()+(hours*3600000); localStorage.setItem(CACHE_PREFIX+key,JSON.stringify({exp,data})); }catch{}
}

function apiUrlBase(){ const u=new URL(`${SERVER}/player_api.php`); u.searchParams.set('username',USERNAME); u.searchParams.set('password',PASSWORD); return u.toString(); }
function apiUrlDirect(action,params={}){ const u=new URL(`${SERVER}/player_api.php`); u.searchParams.set('username',USERNAME); u.searchParams.set('password',PASSWORD); u.searchParams.set('action',action); for(const[k,v] of Object.entries(params)){ if(v!==undefined&&v!==null) u.searchParams.set(k,String(v)); } return u.toString(); }
function proxify(url){ return config.proxyBase+encodeURIComponent(url); }
function buildStreamUrl(type,id,ext){ const sid=encodeURIComponent(String(id)); const e=(ext&&String(ext).trim())?String(ext).trim():(type==='live'?'m3u8':'mp4'); if(type==='live') return `${SERVER}/live/${USER_PATH}/${PASS_PATH}/${sid}.${e}`; if(type==='vod') return `${SERVER}/movie/${USER_PATH}/${PASS_PATH}/${sid}.${e}`; if(type==='series') return `${SERVER}/series/${USER_PATH}/${PASS_PATH}/${sid}.${e}`; return ''; }

async function fetchText(url,{timeoutMs=25000}={}){ const c=new AbortController(); const t=setTimeout(()=>c.abort(),timeoutMs); try{ const res=await fetch(url,{signal:c.signal,cache:'no-store'}); if(!res.ok) throw new Error(`HTTP ${res.status}`); return await res.text(); }finally{ clearTimeout(t); } }
function looksLikeCorsOrBlocked(errMsg){ return /Failed to fetch|CORS|NetworkError|aborted|AbortError/i.test(String(errMsg||'')); }
function isAuthFailJson(json){ try{ const auth=json?.user_info?.auth; return auth===0||auth==='0'||auth===false; }catch{ return false; } }
async function fetchJsonSmart(urlDirect,{timeoutMs=25000,retries=1}={}){
  let lastErr=null;
  for(let attempt=0;attempt<=retries;attempt++){
    try{ const txt=await fetchText(urlDirect,{timeoutMs}); const json=JSON.parse(txt); if(isAuthFailJson(json)) throw new Error('AUTH_FALSE'); return json; }
    catch(err){
      lastErr=err;
      if(config.autoProxyFallback&&looksLikeCorsOrBlocked(String(err?.message||err))){
        try{ const txt2=await fetchText(proxify(urlDirect),{timeoutMs}); const json2=JSON.parse(txt2); if(isAuthFailJson(json2)) throw new Error('AUTH_FALSE'); return json2; }
        catch(err2){ lastErr=err2; }
      }
      await new Promise(r=>setTimeout(r,450+attempt*450));
    }
  }
  throw lastErr;
}

  loadedAll:   { live:false, vod:false, series:false },
  allItems:    { live:[], vod:[], series:[] },

function normalizeCategoryId(id){ if(id===null||id===undefined||id==='') return '0'; return String(id); }
function buildIndexFromList(tab,list){ for(const item of(list||[])){ const id=(tab==='series')?item.series_id:item.stream_id; if(id!=null) allData.indexById[tab].set(String(id),item); } }

async function loadCategories(tab,{force=false}={}){
  if(!SERVER||!USERNAME||!PASSWORD) throw new Error('AUTH_FALSE');
  if(!force&&allData.loadedCats[tab]) return;
  if(!force){ const cached=cacheGet(`cats::${tab}`); if(Array.isArray(cached)&&cached.length){ allData.categories[tab]=cached; allData.loadedCats[tab]=true; return; } }
  const action=actions[tab]?.categories;
  const json=await fetchJsonSmart(apiUrlDirect(action),{timeoutMs:25000,retries:1});
  const cats=Array.isArray(json)?json:[];
  cats.sort((a,b)=>String(a.category_name||'').localeCompare(String(b.category_name||''),'es'));
  allData.categories[tab]=cats; // Sin cabecera "TODOS" — no la necesitamos
  allData.loadedCats[tab]=true;
  cacheSet(`cats::${tab}`,allData.categories[tab],config.cacheHours);
}

async function loadItemsForCategory(tab,catId,{force=false}={}){
  if(!SERVER||!USERNAME||!PASSWORD) throw new Error('AUTH_FALSE');
  const cid=normalizeCategoryId(catId);
  if(!force&&allData.itemsByCat[tab].has(cid)) return allData.itemsByCat[tab].get(cid);
  const action=actions[tab]?.items;
  const params=(cid!=='__all__')?{category_id:cid}:{};
  const json=await fetchJsonSmart(apiUrlDirect(action,params),{timeoutMs:35000,retries:1});
  const items=Array.isArray(json)?json:[];
  allData.itemsByCat[tab].set(cid,items);
  buildIndexFromList(tab,items);
  return items;
}

async function loadAllItems(tab,{force=false}={}){
  if(!SERVER||!USERNAME||!PASSWORD) throw new Error('AUTH_FALSE');
  if(!force&&allData.loadedAll[tab]) return allData.allItems[tab];
  const action=actions[tab]?.items;
  const json=await fetchJsonSmart(apiUrlDirect(action),{timeoutMs:65000,retries:0});
  const items=Array.isArray(json)?json:[];
  allData.allItems[tab]=items;allData.loadedAll[tab]=true;
  allData.indexById[tab].clear();buildIndexFromList(tab,items);
  return items;
}

/* ─── SERIES INFO ─── */
function normalizeSeriesInfo(raw,fallbackTitle='Serie'){
  const info=raw?.info||raw?.series_info||{};
  const title=info.name||raw?.name||fallbackTitle||'Serie';
  const cover=info.cover||raw?.cover||raw?.cover_big||'';
  const plot=info.plot||info.description||'';
  const cast=info.cast||'';const director=info.director||'';const genre=info.genre||'';const rating=info.rating||info.rating_5based||'';
  const seasonsRaw=Array.isArray(raw?.seasons)?raw.seasons:(Array.isArray(info?.seasons)?info.seasons:[]);
  const episodesRaw=raw?.episodes||info?.episodes||{};
  const episodesBySeason=new Map();
  if(Array.isArray(episodesRaw)){ episodesBySeason.set('1',episodesRaw); }
  else if(episodesRaw&&typeof episodesRaw==='object'){ for(const[sn,eps] of Object.entries(episodesRaw)){ if(Array.isArray(eps)) episodesBySeason.set(String(sn),eps); } }
  let seasons=seasonsRaw.map((s,idx)=>{ const sn=s.season_number??s.season_num??s.season??(idx+1); return{season_number:String(sn),name:s.name||s.season_name||`Temporada ${sn}`}; });
  if(!seasons.length&&episodesBySeason.size){ seasons=Array.from(episodesBySeason.keys()).sort((a,b)=>Number(a)-Number(b)).map(sn=>({season_number:String(sn),name:`Temporada ${sn}`})); }
  function normEpisode(ep){ const id=ep?.id??ep?.episode_id??ep?.stream_id; const title=ep?.title||ep?.name||ep?.info?.name||'Episodio'; const num=ep?.episode_num??ep?.episode_number??ep?.num??''; const ext=ep?.container_extension||ep?.ext||'mp4'; const plotEp=ep?.info?.plot||ep?.plot||''; return{id:id!=null?String(id):'',title,num,ext,plot:plotEp}; }
  for(const[sn,arr] of episodesBySeason.entries()){ const normalized=arr.map(normEpisode).filter(e=>e.id); normalized.sort((a,b)=>(Number(a.num)||0)-(Number(b.num)||0)); episodesBySeason.set(String(sn),normalized); }
  let first=null;
  const seasonOrder=Array.from(episodesBySeason.keys()).sort((a,b)=>Number(a)-Number(b));
  for(const sn of seasonOrder){ const eps=episodesBySeason.get(sn)||[]; if(eps.length){ first={season:sn,ep:eps[0]};break; } }
  return{meta:{title,cover,plot,cast,director,genre,rating},seasons,episodesBySeason,firstEpisode:first};
}
async function getSeriesInfo(seriesId,title,{force=false}={}){
  if(!SERVER||!USERNAME||!PASSWORD) throw new Error('AUTH_FALSE');
  const key=String(seriesId);
  if(!force&&seriesInfoCache.has(key)) return seriesInfoCache.get(key);
  const raw=await fetchJsonSmart(apiUrlDirect('get_series_info',{series_id:key}),{timeoutMs:50000,retries:1});
  const norm=normalizeSeriesInfo(raw,title);
  seriesInfoCache.set(key,norm);
  return norm;
}

/* ── REQUEST QUEUE: máximo 2 peticiones de categoría simultáneas ── */
const _fetchQueue = { running:0, max:2, pending:[] };
function queuedLoad(tab, cid){
  return new Promise((resolve, reject) => {
    const run = () => {
      _fetchQueue.running++;
      loadItemsForCategory(tab, cid, {force:false})
        .then(resolve).catch(reject)
        .finally(() => {
          _fetchQueue.running--;
          if(_fetchQueue.pending.length) _fetchQueue.pending.shift()();
        });
    };
    if(_fetchQueue.running < _fetchQueue.max) run();
    else _fetchQueue.pending.push(run);
  });
}

/* máximo de tarjetas a renderizar por fila (evita miles de nodos) */
const MAX_ROW = 30;

function fillRow(row, items, tab){
  const slice = items.slice(0, MAX_ROW);
  row.innerHTML = slice.length
    ? slice.map(item => cardHtml(item, tab, 'item')).join('')
    : `<div style="padding:10px 0;color:var(--sub);font-size:12px">Sin contenido</div>`;
  const countEl = row.previousElementSibling?.querySelector('.n-count');
  if(countEl) countEl.textContent = items.length;
  else { const nameEl = row.previousElementSibling?.querySelector('.cat-section-name'); if(nameEl) nameEl.insertAdjacentHTML('beforeend',`<span class="n-count">${items.length}</span>`); }
}

async function loadCatForGuide(cid){
  if(allData.itemsByCat['live'].has(cid)) return;
  try{ await loadItemsForCategory('live', cid, {force:false}); }catch{}
}

function buildGuideList(){
  const list = document.getElementById('chList');
  if(!list) return;

  const q = _guideSearch.trim().toLowerCase();

  let items;
  if(q){
    // Buscar en TODOS los canales cargados
    items = [];
    for(const [,its] of allData.itemsByCat['live'].entries())
      items.push(...its.filter(it=>String(it.name||'').toLowerCase().includes(q)));
  } else {
    items = allData.itemsByCat['live'].get(_guideActiveCat) || [];
  }

  if(!items.length){
    list.innerHTML=`<div class="empty-state" style="padding:40px"><div class="ei">📭</div><p>${q?'Sin resultados para «'+escapeHtml(q)+'»':'Cargando…'}</p></div>`;
    // Si no hay items, cargar la categoría activa
    if(!q) loadCatForGuide(_guideActiveCat).then(()=>buildGuideList());
    return;
  }

  // Número de canal dentro del grupo (1, 2, 3…)
  const currentId = playContext?.items[playContext?.index]?.stream_id;

  list.innerHTML = items.map((ch, i)=>{
    const id    = ch.stream_id;
    const name  = ch.name||'Canal '+(i+1);
    const logo  = ch.stream_icon||'';
    const num   = String(i+1).padStart(3,'0');
    const isNow = String(id)===String(currentId||'');
    const logoHtml = logo
      ? `<img src="${escapeAttr(logo)}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none'" alt="">`
      : `<span class="ch-logo-fallback">📡</span>`;
    return `<div class="ch-item${isNow?' playing':''}" tabindex="0"
      data-kind="item" data-type="live" data-id="${escapeAttr(id)}">
      <div class="ch-logo">${logoHtml}</div>
      <div class="ch-num">${num}</div>
      <div class="ch-info">
        <div class="ch-name">${escapeHtml(name)}</div>
      </div>
      ${isNow?'<div class="ch-playing-dot"></div>':'<div class="ch-arrow">›</div>'}
    </div>`;
  }).join('');

  // Lazy load de categorías vecinas (precarga silenciosa)
  const cats = allData.categories['live']||[];
  const idx  = cats.findIndex(c=>normalizeCategoryId(c.category_id)===_guideActiveCat);
  [-1,1].forEach(d=>{
    const n=cats[idx+d];
    if(n && !isAdultContent(n.category_name||'')){
      const ncid=normalizeCategoryId(n.category_id);
      if(!allData.itemsByCat['live'].has(ncid)) loadCatForGuide(ncid);
    }
  });
}

/* BROWSE: muestra secciones por categoría con scroll horizontal (vod/series) */
function renderBrowse(){
  // LIVE usa la guía de canales en su lugar
  if(currentTab==='live'){ renderLiveGuide(); return; }

  const cats = allData.categories[currentTab] || [];
  if(!cats.length){ mainContent.innerHTML=`<div class="empty-state"><div class="ei">📭</div><p>Sin categorías</p></div>`; return; }

  _fetchQueue.running = 0;
  _fetchQueue.pending.length = 0;

  mainContent.innerHTML = `<div class="browse-wrap" id="browseWrap"></div>`;
  const wrap = document.getElementById('browseWrap');
  const tab  = currentTab;

  cats.forEach((cat) => {
    const cid  = normalizeCategoryId(cat.category_id);
    const name = tidyLabel(cat.category_name||'') || cat.category_name || '';

    const section = document.createElement('div');
    section.className = 'cat-section';
    section.style.contentVisibility = 'auto';
    section.style.containIntrinsicSize = '0 220px';

    const preloaded = allData.itemsByCat[tab].get(cid);
    const catIsAdult = isAdultContent(name);
    section.innerHTML = `
      <div class="cat-section-head">
        <div class="cat-section-name">${catIsAdult?'🔞 ':''}${escapeHtml(name)}${preloaded?`<span class="n-count">${preloaded.length}</span>`:''}</div>
      </div>
      <div class="cat-row" id="row-${escapeAttr(cid)}">${preloaded ? preloaded.slice(0,MAX_ROW).map(item=>cardHtml(item,tab,'item')).join('') : skeletonRow(6)}</div>`;

    wrap.appendChild(section);

    if(!preloaded){
      const obs = new IntersectionObserver((entries, o) => {
        if(!entries[0].isIntersecting) return;
        o.disconnect();
        queuedLoad(tab, cid)
          .then(items => { const row=document.getElementById(`row-${cid}`); if(row) fillRow(row, items, tab); })
          .catch(()  => { const row=document.getElementById(`row-${cid}`); if(row) row.innerHTML=`<div style="padding:10px 0;color:var(--sub);font-size:12px">Error al cargar</div>`; });
      }, { rootMargin:'80px' });
      obs.observe(section);
    }
  });
}

let hls=null, playSeq=0, playContext=null;
let autoNextTimer=null, _progTimer=null;

function getHlsConfig(mode){
  const base={
    enableWorker:true,
    lowLatencyMode:false,
    maxBufferHole:2,           // tolerar huecos de hasta 2s sin reiniciar
    startLevel:-1,             // ABR automático
    // Timeouts generosos para conexiones lentas
    manifestLoadingTimeOut:25000,
    manifestLoadingMaxRetry:6,
    manifestLoadingRetryDelay:1000,
    levelLoadingTimeOut:25000,
    levelLoadingMaxRetry:6,
    levelLoadingRetryDelay:1000,
    fragLoadingTimeOut:30000,
    fragLoadingMaxRetry:8,     // reintentar fragmento hasta 8 veces sin mostrarlo
    fragLoadingRetryDelay:500, // reintento rápido (500ms)
    // Reconexión silenciosa ante errores de red
    appendErrorMaxRetry:5,
    // No mostrar error hasta agotar reintentos
    nudgeMaxRetry:5,
  };
  if(mode==='live') return Object.assign({},base,{
    backBufferLength:20,
    maxBufferLength:60,        // buffer más pequeño en live para menos lag
    maxBufferSize:60e6,
    liveSyncDurationCount:6,
    liveMaxLatencyDurationCount:20,
    maxLiveSyncPlaybackRate:1.15,
    abrBandWidthFactor:.85,
    abrEwmaDefaultEstimate:3e6,
    capLevelToPlayerSize:true,
    // Rebobinar automáticamente si el jugador se cuelga
    xhrSetupTimeout:15000,
  });
  return Object.assign({},base,{
    backBufferLength:60,
    maxBufferLength:180,       // 3 min de buffer para VOD
    maxBufferSize:100e6,
    abrBandWidthFactor:.9,
    abrEwmaDefaultEstimate:5e6,
    capLevelToPlayerSize:true,
  });
}

function destroyPlayback(){
  clearTimeout(autoNextTimer);autoNextTimer=null;
  clearInterval(_progTimer);_progTimer=null;
  // 1) Pausar inmediatamente
  try{player.pause();}catch{}
  // 2) Destruir HLS antes de tocar el src
  if(hls){try{hls.stopLoad();hls.detachMedia();hls.destroy();}catch{}hls=null;}
  // 3) Limpiar src completamente — vacío string + removeAttribute + load()
  try{
    player.src='';
    player.removeAttribute('src');
    // Eliminar todos los <source> hijos si los hubiera
    while(player.firstChild) player.removeChild(player.firstChild);
    player.load(); // fuerza reset del media element
  }catch{}
}
function showSpinner(){playerLoading.style.display='block';updateStatus('● Buffering…','loading');}
function hideSpinner(){playerLoading.style.display='none';updateStatus('● Reproduciendo','connected');}

/* ─── FIX DE AUDIO ────────────────────────────────────────────
   Problema: streams HLS de alta res llevan pistas AC-3/EAC-3 que
   muchos navegadores no reproducen → se oye vídeo sin sonido.
   Solución: seleccionar siempre la pista AAC cuando hay varias.
   También: desmutar siempre, nunca dejar volume=0.
──────────────────────────────────────────────────────────────── */
function ensureAudio(){
  try{player.muted=false;if(player.volume<0.05) player.volume=1.0;}catch{}
  if(hls){
    // Forzar pista de audio AAC si hay varias
    const tracks=hls.audioTracks||[];
    if(tracks.length>1){
      let best=-1;
      // Prioridad 1: mp4a/aac  Prioridad 2: la primera que no sea ac-3/eac-3
      tracks.forEach((t,i)=>{
        const c=String(t.codec||t.type||'').toLowerCase();
        if(/mp4a|aac/.test(c)) best=i;
      });
      if(best<0) tracks.forEach((t,i)=>{if(!/ac-3|eac|ec-3|dts/.test(String(t.codec||'').toLowerCase())) best=i;});
      if(best>=0&&hls.audioTrack!==best){try{hls.audioTrack=best;}catch{}}
    }
  }
}

}

/* Contador de reconexiones silenciosas para streams .ts */
let _tsReconnectTimer=null, _tsReconnectCount=0;

function playUrl(url,mode){
  cancelAutoNext();
  clearTimeout(_tsReconnectTimer);_tsReconnectTimer=null;_tsReconnectCount=0;
  const seq=++playSeq;
  destroyPlayback();showSpinner();
  const guard=(fn)=>(...args)=>{if(seq===playSeq) fn(...args);};

  const isHls  = /\.m3u8(\?|$)/i.test(url)||url.includes('.m3u8');
  const isTs   = /\.ts(\?|$)/i.test(url)||url.includes('.ts?')||url.includes('/ts/');
  // HLS.js puede leer streams .ts directamente (los encapsula en MSE)
  const useHls = (isHls||isTs) && Hls.isSupported();

  function tryPlay(){
    player.muted=false;player.volume=1.0;
    const p=player.play();
    if(p&&p.then) p.catch(err=>{
      if(/NotAllowed|autoplay/i.test(String(err))){
        player.muted=true;
        player.play().then(()=>{
          const h=document.getElementById('unmuteHint');if(h) h.style.display='flex';
        }).catch(()=>{});
      }
    });
  }

  if(useHls){
    const cfg=getHlsConfig(mode);
    hls=new Hls(cfg);
    hls.attachMedia(player);
    hls.on(Hls.Events.MEDIA_ATTACHED,guard(()=>{hls.loadSource(url);}));
    hls.on(Hls.Events.MANIFEST_PARSED,guard((e,data)=>{
      // Pista de audio AAC preferida
      if(data&&(data.audioTracks||[]).length>1){
        let best=-1;
        (data.audioTracks||[]).forEach((t,i)=>{
          if(/mp4a|aac/.test(String(t.codec||'').toLowerCase())) best=i;
        });
        if(best>=0) try{hls.audioTrack=best;}catch{}
      }
      tryPlay();
    }));
    hls.on(Hls.Events.AUDIO_TRACK_SWITCHED,guard(ensureAudio));

    // Reconexión silenciosa sin mostrar error al usuario
    hls.on(Hls.Events.ERROR,guard((ev,data)=>{
      if(!data.fatal){
        // Error no fatal: HLS.js lo reintenta solo — solo mostramos spinner si buffering
        if(data.type===Hls.ErrorTypes.NETWORK_ERROR) showSpinner();
        return;
      }
      // Error fatal — intentar recuperar antes de rendirse
      if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
        if(_tsReconnectCount<8){
          _tsReconnectCount++;
          showSpinner();
          updateStatus('Reconectando…','loading');
          _tsReconnectTimer=setTimeout(guard(()=>{
            try{hls.startLoad();}catch{}
          }),800*_tsReconnectCount); // espera progresiva: 800ms, 1.6s, 2.4s…
        } else {
          // Agotamos reintentos: reiniciar stream completo silenciosamente
          _tsReconnectCount=0;
          updateStatus('Reconectando…','loading');
          setTimeout(guard(()=>playUrl(url,mode)),2000);
        }
        return;
      }
      if(data.type===Hls.ErrorTypes.MEDIA_ERROR){
        _tsReconnectCount++;
        if(_tsReconnectCount<=4){
          try{hls.recoverMediaError();}catch{}
        } else {
          _tsReconnectCount=0;
          setTimeout(guard(()=>playUrl(url,mode)),1500);
        }
        return;
      }
      // Otro error fatal: reiniciar
      setTimeout(guard(()=>playUrl(url,mode)),2000);
    }));
    return;
  }

  // Fallback nativo (Safari en iOS para .m3u8, o formatos no-HLS)
  if(isHls&&player.canPlayType('application/vnd.apple.mpegurl')){
    player.src=url;player.load();tryPlay();return;
  }
  // MP4 u otros formatos directos
  player.src=url;player.load();tryPlay();
}

function ctxBuildUrl(type,item){if(!item) return '';if(type==='series_ep') return buildStreamUrl('series',ctxGetId(type,item),ctxGetExt(type,item));if(type==='live') return buildStreamUrl('live',ctxGetId(type,item),ctxGetExt(type,item));if(type==='vod') return buildStreamUrl('vod',ctxGetId(type,item),ctxGetExt(type,item));return '';}

/* ── AUTO-HIDE BARRA PLAYER ──
   Muestra la barra al tocar/mover, la oculta después de 3s de inactividad.
   Si el drawer está abierto o el video está pausado, la mantiene visible.
*/
let _headerHideTimer=null;
function showPlayerHeader(){

/* ── CONTROL REMOTO — teclado completo ── */
const SEEK=10;
document.addEventListener('keydown',(e)=>{
  const inPl=playerOverlay.classList.contains('active');
  const inDr=playerDrawer.classList.contains('active');
  const k=e.key;
  if(inDr){
    if(k==='ArrowDown'||k==='ArrowUp'){e.preventDefault();const els=[...drawerList.querySelectorAll('.drawer-item')];const c=els.findIndex(x=>x===document.activeElement);const n=k==='ArrowDown'?Math.min(c+1,els.length-1):Math.max(c-1,0);els[n]?.focus();els[n]?.scrollIntoView({block:'nearest'});return;}
    if(k==='Enter'||k===' '){e.preventDefault();document.activeElement?.click();return;}
    if(/Escape|Backspace|BrowserBack|GoBack/.test(k)){e.preventDefault();closeDrawer();return;}
    return;
  }
  if(inPl){
    e.preventDefault();
    switch(k){
      case 'Escape':case 'Backspace':case 'BrowserBack':case 'GoBack':case 'XF86Back':closePlayer();break;
      case ' ':case 'Enter':case 'MediaPlayPause':case 'XF86PlayPause':if(player.paused)player.play().catch(()=>{});else player.pause();break;
      case 'MediaPlay':case 'XF86Play':player.play().catch(()=>{});break;
      case 'MediaPause':case 'XF86Pause':player.pause();break;
      case 'ArrowRight':case 'MediaFastForward':case 'XF86FastForward':
        if(player.duration&&isFinite(player.duration))player.currentTime=Math.min(player.duration,player.currentTime+SEEK);else playNextCtx();break;
      case 'ArrowLeft':case 'MediaRewind':case 'XF86Rewind':
        if(player.duration&&isFinite(player.duration))player.currentTime=Math.max(0,player.currentTime-SEEK);else playPrevCtx();break;
      case 'ArrowDown':case 'MediaTrackNext':case 'PageDown':playNextCtx();break;
      case 'ArrowUp':case 'MediaTrackPrevious':case 'PageUp':playPrevCtx();break;
      case 'f':case 'F':case 'XF86ZoomIn':toggleFullscreen();break;
      case 'l':case 'L':case 'i':case 'I':case 'XF86EPG':if(inDr)closeDrawer();else openDrawer();break;
      case 's':case 'S':btnFav?.click();break;
      case 'VolumeUp':case 'XF86AudioRaiseVolume':player.volume=Math.min(1,player.volume+.1);player.muted=false;break;
      case 'VolumeDown':case 'XF86AudioLowerVolume':player.volume=Math.max(0,player.volume-.1);break;
      case 'VolumeMute':case 'XF86AudioMute':player.muted=!player.muted;if(!player.muted)ensureAudio();break;
      case 'r':case 'ColorF0Red':cancelAutoNext();break;
    }
    return;
  }
  const fc=document.activeElement;
  if(k==='Enter'||k===' '){e.preventDefault();fc?.click();return;}

  // Navegación espacial en el catálogo (flechas)
  if(k==='ArrowRight'||k==='ArrowLeft'||k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();
    const cards=[...mainContent.querySelectorAll('[tabindex="0"]')];
    const ci=cards.indexOf(fc);
    if(ci>=0){
      let ni=-1;
      if(k==='ArrowRight') ni=ci+1;
      else if(k==='ArrowLeft') ni=ci-1;
      else if(k==='ArrowDown'){
        // Calcular cuántas columnas hay (por posición X)
        const fcr=fc.getBoundingClientRect();
        const col=Math.round(fcr.left/fcr.width);
        // Bajar = buscar el elemento más cercano hacia abajo
        const below=cards.slice(ci+1).find(c=>{
          const r=c.getBoundingClientRect();
          return r.top>fcr.top+fcr.height*0.4;
        });
        if(below) ni=cards.indexOf(below);
      } else if(k==='ArrowUp'){
        const fcr=fc.getBoundingClientRect();
        const above=[...cards.slice(0,ci)].reverse().find(c=>{
          const r=c.getBoundingClientRect();
          return r.bottom<fcr.top+fcr.height*0.4;
        });
        if(above) ni=cards.indexOf(above);
      }
      if(ni>=0&&ni<cards.length){
        cards[ni].focus();
        cards[ni].scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});
        return;
      }
    }
    // Sin elemento enfocado: enfocar el primero
    if(ci<0&&cards.length){cards[0].focus();return;}
  }

  if(/Backspace|BrowserBack|GoBack|XF86Back/.test(k)){
    e.preventDefault();
    if(searchBar.classList.contains('active')){closeSearch();return;}
    if(seriesView){closeSeriesDetail();return;}
    if(currentTab!=='home'){currentTab='home';currentSearch='';setActiveTab('home');render();return;}
  }
  if(k==='Escape'){
    if(searchBar.classList.contains('active')){closeSearch();return;}
    if(seriesView){closeSeriesDetail();return;}
  }
  // Atajo lupa con tecla roja/amarilla/ColorF1
  if(k==='ColorF1Yellow'||k==='F1'||k==='Search'||k==='XF86Search'){
    if(searchBar.classList.contains('active')) closeSearch();
    else openSearch();
  }
});

async function doSearch(q){
  if(!q){
    currentSearch='';
    const _searchIn = (currentTab!=='home')?currentTab:searchTabActive;
    const _searchLabel = _searchIn==='vod'?'Películas':_searchIn==='series'?'Series':'TV en Vivo';
    mainContent.innerHTML=`<div class="search-hint-inline">Escribe para buscar en <strong>${_searchLabel}</strong></div>`;
    return;
  }
  currentSearch=q;
  seriesView=null;
  // Desde sección específica → busca solo ahí; desde home → usa selector
  const tab = (currentTab!=='home') ? currentTab : searchTabActive;
  // Cargar categorías si falta
  if(!allData.loadedCats[tab]){
    mainContent.innerHTML=`<div class="search-hint-inline">Cargando catálogo…</div>`;
    try{ await loadCategories(tab,{force:false}); }
    catch(err){ console.error(err); if(isAuthError(err)) return handleBadList('Lista inválida.'); return; }
  }
  // Cargar todos los items si falta
  if(!allData.loadedAll[tab]){
    mainContent.innerHTML=`<div class="search-hint-inline">Cargando catálogo completo para «${escapeHtml(q)}»…<br><small>Solo la primera vez tarda un poco</small></div>`;
    try{ await loadAllItems(tab,{force:false}); }
    catch(err){ console.error(err); if(isAuthError(err)) return handleBadList('Lista inválida.'); return; }
  }
  const ql=q.toLowerCase();
  const results=(allData.allItems[tab]||[]).filter(it=>
    String(it.name||it.title||'').toLowerCase().includes(ql)
  );
  if(!results.length){
    mainContent.innerHTML=`<div class="search-hint-inline">Sin resultados para «<strong>${escapeHtml(q)}</strong>»<br><small>Prueba en otra categoría usando los botones de arriba</small></div>`;
    return;
  }
  // Mostrar resultados con cardHtml estándar
  mainContent.innerHTML=`
    <div class="search-results">
      <div style="padding:12px 14px 4px;font-size:12px;color:var(--sub);font-weight:600">${results.length} resultado${results.length!==1?'s':''} en ${tab==='vod'?'Películas':tab==='series'?'Series':'TV en Vivo'}</div>
      <div class="search-grid">
        ${results.slice(0,120).map(it=>cardHtml(it,tab,'item-search')).join('')}
      </div>
    </div>`;
}

mainContent.addEventListener('click',async(e)=>{
  const btn=e.target.closest('[data-kind]');

  const kind=btn.dataset.kind;

  if(kind==='refresh') return refreshAll();

  if(kind==='go'){
    const tab=btn.dataset.tab;if(!tab) return;
    currentTab=tab;currentSearch='';seriesView=null;setActiveTab(tab);
    if(!allData.loadedCats[tab]){
      showLoading('Cargando contenido…');updateStatus('Cargando…','loading');
      try{ await loadCategories(tab);hideLoading(); }
      catch(err){ console.error(err);if(isAuthError(err)) return handleBadList('Lista inválida.');showLoadingError('Error cargando categorías',String(err?.message||err));updateStatus('● Error','error');return; }
    }
    updateStatus('● Conectado','connected');render();return;
  }

  if(kind==='clear-search'){currentSearch='';searchInput.value='';render();return;}
  if(kind==='home-back'){currentTab='home';currentSearch='';seriesView=null;setActiveTab('home');render();return;}

  /* ── Secciones del home ── */
  if(kind==='home-section'){
    const sec=btn.dataset.section;
    if(sec==='recent'){
      const rec=getRecent();
      if(!rec.length){showToast('Aún no has visto nada','');return;}
      renderSpecialGrid('Recientemente visto',rec,true);return;
    }
    if(sec==='favs'){
      const favs=getFavList();
      if(!favs.length){showToast('No tienes favoritos aún — agrega con ☆','');return;}
      renderSpecialGrid('Favoritos ⭐',favs);return;
    }
    if(sec==='estrenos'){
      renderEstrenos();return;
    }
    return;
  }

  if(kind==='item'||kind==='item-search'||kind==='item-special'){
    const type=btn.dataset.type;const id=btn.dataset.id;
    const item=allData.indexById[type]?.get(String(id));
    const title=item?.name||item?.title||btn.dataset.name||'Sin título';
    if(type==='series'){
      if(isAdultContent(title)) requireAdultPin(()=>openSeries(id,title));
      else openSeries(id,title);
      return;
    }
    const ext=item?.container_extension||(type==='live'?'m3u8':'mp4');
    const url=buildStreamUrl(type,id,ext);
    let list=[];
    if(kind==='item-search'){
      const q=currentSearch.trim().toLowerCase();
      list=(allData.allItems[type]||[]).filter(it=>String(it.name||it.title||'').toLowerCase().includes(q));
    } else {
      for(const[cid,items] of allData.itemsByCat[type].entries()){
        if(items.some(it=>String(it.stream_id)===String(id))){ list=items;break; }
      }
      if(!list.length) list=allData.allItems[type]||[];
    }
    const idx=Math.max(0,list.findIndex(it=>String(it.stream_id)===String(id)));
    const ctx={type,items:list,index:idx,label:(type==='live')?'Canales':'Películas'};
    // Verificar control parental antes de reproducir
    const _playItem=()=>{ if(type!=='live') offerResume(type,id,title,url,ctxMode(type),ctx); else openPlayerWithContext({title,url,context:ctx}); };
    if(isAdultContent(title)||isAdultContent(item?.category_name||'')){
      requireAdultPin(_playItem);
    } else {
      // Verificar si la categoría a la que pertenece es adulto
      let catName='';
      for(const[cid,its] of allData.itemsByCat[type].entries()){
        if(its.some(it=>String(it.stream_id)===String(id))){
          const cat=(allData.categories[type]||[]).find(c=>normalizeCategoryId(c.category_id)===cid);
          if(cat) catName=cat.category_name||'';
          break;
        }
      }
      if(isAdultContent(catName)) requireAdultPin(_playItem);
      else _playItem();
    }
    return;
  }

  if(kind==='series-back'){closeSeriesDetail();return;}
  if(kind==='series-retry'){
    if(!seriesView) return;
    seriesInfoCache.delete(String(seriesView.seriesId));
    seriesView.infoNorm=null;render();openSeries(seriesView.seriesId,seriesView.title);return;
  }
  if(kind==='season'){
    if(!seriesView) return;
    seriesView.seasonSelected=String(btn.dataset.season);render();return;
  }
  if(kind==='play-first'||kind==='episode'){
    if(!seriesView?.infoNorm) return;
    const norm=seriesView.infoNorm;
    const season=String(btn.dataset.season||seriesView.seasonSelected||'1');
    const eps=norm.episodesBySeason.get(season)||[];
    const idx=Math.max(0,Number(btn.dataset.epIndex||0));
    const ep=eps[idx];if(!ep) return;
    const titleBase=norm.meta?.title||seriesView.title||'Serie';
    const url=buildStreamUrl('series',ep.id,ep.ext||'mp4');
    const epTitle=`${titleBase} - ${ep.title||'Episodio'}`;
    const ctx={type:'series_ep',items:eps,index:idx,label:`Episodios (${titleBase})`};
    // Ofrecer reanudar si hay progreso guardado para este episodio
    const epId=String(ep.id||'');
    const _playEp=()=>{ if(epId) offerResume('series_ep',epId,epTitle,url,'vod',ctx); else openPlayerWithContext({title:epTitle,url,context:ctx}); };
    if(isAdultContent(titleBase)||isAdultContent(epTitle)) requireAdultPin(_playEp);
    else _playEp();
    return;
  }
});

function renderSpecialGrid(title, items, isRecent=false){
  // Filtrar contenido adulto si está bloqueado
  const safeItems = isRecent
    ? items.filter(it=>!isAdultContent(it.name||it.title||''))
    : items;

  function buildGrid(list){
    return list.map(it=>{
      const logo=it.cover||it.stream_icon||'';
      const name=it.name||it.title||'Sin título';
      const prog=getProgress(it.type,it.id);
      const pct=prog?Math.round(prog.pct*100):0;
      const delBtn=isRecent?`<button class="del-recent-btn" data-kind="del-recent" data-type="${escapeAttr(it.type)}" data-id="${escapeAttr(it.id)}" title="Borrar de recientes">✕</button>`:'';
      return `<div class="item-card" tabindex="0" data-kind="item-special" data-type="${escapeAttr(it.type)}" data-id="${escapeAttr(it.id)}" data-name="${escapeAttr(name)}" title="${escapeAttr(name)}"><div class="item-poster">${logo?`<img src="${escapeAttr(logo)}" loading="lazy" decoding="async" alt="" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`:`<div class="item-fallback"><div class="fi">🎬</div><div class="fn">${escapeHtml(name)}</div></div>`}${delBtn}<div class="play-overlay"><div class="play-circle"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg></div></div></div><div class="item-info"><div class="item-name">${escapeHtml(name)}</div></div>${pct>2?`<div class="item-progress"><div class="item-progress-fill" style="width:${pct}%"></div></div>`:''}</div>`;
    }).join('');
  }

  mainContent.innerHTML=`
    <div class="search-results">
      <div class="section-header" style="position:relative;top:0">
        <button class="back-btn" data-kind="home-back">← Inicio</button>
        <div><div class="sec-name">${escapeHtml(title)}</div><div class="sec-count">${safeItems.length} títulos${isRecent?' · toca ✕ para borrar':''}</div></div>
      </div>
      <div class="search-grid" id="specialGrid" style="margin-top:16px">
        ${buildGrid(safeItems)}
      </div>
    </div>`;

  // Manejar clic en ✕ borrar — redibujar sin recargar toda la página
  document.getElementById('specialGrid')?.addEventListener('click',(e)=>{
    const btn=e.target.closest('[data-kind="del-recent"]');
    if(!btn) return;
    e.stopPropagation();
    const {type,id}=btn.dataset;
    deleteRecent(type,id);
    clearProgress(type,id);
    // Quitar tarjeta con animación
    const card=btn.closest('.item-card');
    if(card){
      card.style.transition='opacity .2s,transform .2s';
      card.style.opacity='0';card.style.transform='scale(0.85)';
      setTimeout(()=>card.remove(),200);
    }
  });
}

    currentTab='home';setActiveTab('home');render();
  }catch(err){
    console.error(err);if(isAuthError(err)) return handleBadList('Lista inválida o expirada.');
    updateStatus('● Error','error');showLoadingError('Error al iniciar',String(err?.message||err));
  }
})();
</script>
</body>
</html>
